# GCP Project Configuration
gcp.project-id=${GCP_PROJECT_ID:your-gcp-project-id}
gcp.location=${GCP_LOCATION:us-central1}

# Vertex AI Configuration
vertex.ai.base-url=https://${gcp.location}-aiplatform.googleapis.com
vertex.ai.api-version=v1beta1

# BigQuery Gemini Data Agent (Reasoning Engine) Configuration
# The ID of the deployed Reasoning Engine that serves as the BQ GDA.
# Example: projects/my-project/locations/us-central1/reasoningEngines/123456789
vertex.ai.reasoning-engine-id=${VERTEX_REASONING_ENGINE_ID:your-reasoning-engine-id}

# Spring Boot Application
spring.application.name=bq-gda-agent
server.port=8080
